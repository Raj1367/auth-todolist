services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://backend:8000/api
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
